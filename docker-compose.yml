version: "3.9"

services:
  db:
    image: postgres:16
    container_name: booking_db
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: booking_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/booking_db
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: